services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    networks:
      - pulse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=/api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./SSL:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - pulse_network
    restart: unless-stopped

networks:
  pulse_network:
    driver: bridge
